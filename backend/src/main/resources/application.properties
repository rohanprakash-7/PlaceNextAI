spring.application.name=placenextai-backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/placenextai_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:placenextai-dev-secret-key-9f8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.ai-service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8000}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
