spring.application.name=placenextai-backend
# Render (and most PaaS hosts) assign the listen port dynamically via $PORT.
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/placenextai_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:placenextai-dev-secret-key-9f8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.ai-service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8000}

# Email notifications are OFF by default so the app never fails to start or hangs
# on unconfigured SMTP. Set MAIL_ENABLED=true and real credentials to turn them on.
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@placenextai.local}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# --- Monitoring ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
# Actuator auto-probes SMTP connectivity regardless of our own app.mail.enabled
# flag - since mail is opt-in and usually unconfigured, that would otherwise
# drag the whole health check to DOWN for an unrelated, non-critical feature.
management.health.mail.enabled=false

# --- Logging ---
logging.level.root=INFO
logging.level.com.placenextai=INFO
logging.level.org.hibernate.SQL=INFO
logging.file.name=logs/placenextai-backend.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=14
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
