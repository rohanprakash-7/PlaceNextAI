# Activated with SPRING_PROFILES_ACTIVE=prod. Overrides only what must differ
# in production; everything else falls back to application.properties.

# Never let Hibernate auto-migrate a production schema - use 'validate' and
# apply real migrations out of band once you introduce a migration tool.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Swagger/OpenAPI UI is a dev convenience - keep it off in production.
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

logging.level.root=WARN
logging.level.com.placenextai=INFO
logging.level.org.hibernate.SQL=WARN

management.endpoint.health.show-details=never
