# Used only by @ActiveProfiles("test") - an isolated in-memory H2 database so
# CI and local test runs never need a real MySQL instance.
spring.datasource.url=jdbc:h2:mem:placenextai_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

app.jwt.secret=test-only-secret-key-not-for-production-use-0123456789abcdef
app.jwt.expiration-ms=3600000
app.cors.allowed-origins=http://localhost:5173
app.mail.enabled=false
app.mail.from=test@placenextai.local
app.ai-service.base-url=http://localhost:8000
